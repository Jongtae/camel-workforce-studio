name: "1️⃣ Semi-Autonomous Run (Draft)"

on:
  workflow_dispatch:
    inputs:
      rounds:
        description: "Commitment 라운드 수"
        required: false
        default: "1"
      model:
        description: "OpenAI 모델"
        required: false
        default: "gpt-4o-mini"
      issue_type:
        description: "Issue 발급 형태"
        required: true
        type: choice
        options:
          - "single"
          - "task"
          - "epic"
          - "sprint"
          - "bundle"
        default: "bundle"
      epic_label:
        description: "Epic에 붙일 label (예: epic:forum-actions)"
        required: false
      with_sprint:
        description: "Bundle 생성 시 sprint planning issue도 함께 생성"
        required: false
        type: boolean
        default: true

jobs:
  semi-autonomous-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      issues: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout ad-fashion-forum
        uses: actions/checkout@v4
        with:
          repository: Jongtae/ad-fashion-forum
          path: ../ad-fashion-forum
          token: ${{ secrets.WORKFORCE_GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Semi-Autonomous Pipeline (Issue Draft)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.WORKFORCE_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.WORKFORCE_GH_TOKEN }}
        run: |
          python scripts/pipeline/run_studio.py \
            --repo Jongtae/ad-fashion-forum \
            --source-dir ../ad-fashion-forum \
            --rounds ${{ inputs.rounds }} \
            --model ${{ inputs.model }} \
            --create-issue \
            --issue-type ${{ inputs.issue_type }} \
            ${{ inputs.epic_label && format('--epic-label {0}', inputs.epic_label) || '' }} \
            ${{ inputs.with_sprint && '--with-sprint' || '' }}

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-outputs
          path: |
            scripts/requirement-debate/outputs/
            context/
          retention-days: 30

      - name: Comment on Run Summary
        if: always()
        run: |
          echo "✅ Semi-Autonomous Run 완료"
          echo ""
          echo "📋 생성된 산출물:"
          echo "- decision.md"
          echo "- handoff.md"
          echo "- issue_plan.md (draft)"
          echo ""
          echo "다음 단계:"
          echo "1. artifacts에서 issue_plan.md 검토"
          echo "2. Dispatch 2️⃣ (Approve Issue)를 실행하여 GitHub issue 발급"
