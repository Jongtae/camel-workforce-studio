name: "3️⃣ Nightly Workforce Run & Issue Registration (AI-Fashion-Forum)"

on:
  schedule:
    - cron: "9 13 * * *"
  workflow_dispatch:
    inputs:
      rounds:
        description: "Commitment 라운드 수"
        required: false
        default: "1"
      model:
        description: "OpenAI 모델"
        required: false
        default: "gpt-4o-mini"
      issue_type:
        description: "Issue 발급 형태"
        required: true
        type: choice
        options:
          - "single"
          - "task"
          - "epic"
          - "sprint"
          - "bundle"
        default: "bundle"
      epic_label:
        description: "Epic에 붙일 label (예: epic:forum-actions)"
        required: false
      with_sprint:
        description: "Bundle 생성 시 sprint planning issue도 함께 생성"
        required: false
        type: boolean
        default: true

jobs:
  nightly-workforce-run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: read
      issues: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout AI-Fashion-Forum
        uses: actions/checkout@v4
        with:
          repository: Jongtae/AI-Fashion-Forum
          path: ../AI-Fashion-Forum
          token: ${{ secrets.WORKFORCE_GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run Nightly Workforce Pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.WORKFORCE_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFORCE_TARGET_REPO: Jongtae/AI-Fashion-Forum
        run: |
          python scripts/pipeline/run_studio.py \
            --repo Jongtae/AI-Fashion-Forum \
            --source-dir ../AI-Fashion-Forum \
            --rounds ${{ inputs.rounds || '1' }} \
            --model ${{ inputs.model || 'gpt-4o-mini' }} \
            --create-issue \
            --approve-issue \
            --issue-type ${{ inputs.issue_type || 'bundle' }} \
            ${{ inputs.epic_label && format('--epic-label {0}', inputs.epic_label) || '' }} \
            ${{ inputs.with_sprint && '--with-sprint' || '' }}

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-workforce-outputs
          path: |
            scripts/requirement-debate/outputs/
            context/
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "✅ Nightly workforce run completed"
          echo "📍 Issue target repo: Jongtae/AI-Fashion-Forum"
          echo "📦 Artifacts: scripts/requirement-debate/outputs/, context/"
